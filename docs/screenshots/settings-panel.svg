<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#EEF2FF"/>
  <rect x="60" y="40" width="1160" height="640" rx="28" fill="#F8FAFC" stroke="#CBD5E1"/>
  <rect x="60" y="40" width="1160" height="72" rx="28" fill="#1E293B"/>
  <text x="104" y="84" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="24" font-weight="700">Configuracion de la extension</text>

  <rect x="120" y="152" width="460" height="468" rx="28" fill="white" stroke="#CBD5E1"/>
  <text x="156" y="204" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Ajustes</text>

  <text x="156" y="266" fill="#0F172A" font-family="Arial, sans-serif" font-size="22" font-weight="700">Notificaciones</text>
  <text x="156" y="298" fill="#64748B" font-family="Arial, sans-serif" font-size="18">Avisar cuando un cooldown termine</text>
  <rect x="456" y="262" width="72" height="36" rx="18" fill="#2563EB"/>
  <rect x="490" y="266" width="28" height="28" rx="14" fill="white"/>

  <text x="156" y="370" fill="#0F172A" font-family="Arial, sans-serif" font-size="22" font-weight="700">Sonido</text>
  <text x="156" y="402" fill="#64748B" font-family="Arial, sans-serif" font-size="18">Reproducir beep al finalizar</text>
  <rect x="456" y="366" width="72" height="36" rx="18" fill="#2563EB"/>
  <rect x="490" y="370" width="28" height="28" rx="14" fill="white"/>

  <text x="156" y="474" fill="#0F172A" font-family="Arial, sans-serif" font-size="22" font-weight="700">Importar / Exportar</text>
  <rect x="156" y="508" width="172" height="44" rx="18" fill="#E2E8F0"/>
  <text x="194" y="536" fill="#334155" font-family="Arial, sans-serif" font-size="18" font-weight="700">Exportar datos</text>
  <rect x="344" y="508" width="172" height="44" rx="18" fill="#DBEAFE"/>
  <text x="382" y="536" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="18" font-weight="700">Importar JSON</text>

  <rect x="624" y="152" width="536" height="468" rx="28" fill="white" stroke="#CBD5E1"/>
  <text x="660" y="204" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Ejemplo de datos</text>
  <rect x="660" y="236" width="464" height="332" rx="20" fill="#0F172A"/>
  <text x="688" y="282" fill="#93C5FD" font-family="Courier New, monospace" font-size="18">{"version": 2,</text>
  <text x="688" y="316" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">  "items": [</text>
  <text x="688" y="350" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">    { "url": "https://example.com/" }</text>
  <text x="688" y="384" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">  ],</text>
  <text x="688" y="418" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">  "settings": {</text>
  <text x="688" y="452" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">    "notificationsOn": true,</text>
  <text x="688" y="486" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">    "soundOn": true</text>
  <text x="688" y="520" fill="#E2E8F0" font-family="Courier New, monospace" font-size="18">  }</text>
  <text x="688" y="554" fill="#93C5FD" font-family="Courier New, monospace" font-size="18">}</text>

  <rect x="660" y="584" width="464" height="44" rx="16" fill="#DCFCE7"/>
  <text x="690" y="612" fill="#166534" font-family="Arial, sans-serif" font-size="18" font-weight="700">Consejo: exporta antes de probar cambios grandes.</text>
</svg>
